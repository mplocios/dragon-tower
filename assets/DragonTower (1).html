#game-overlay{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 65% 50% at 62% 42%,rgba(160,70,8,.3) 0%,transparent 68%),linear-gradient(180deg,rgba(18,7,3,.44) 0%,rgba(8,4,2,.16) 45%,rgba(4,2,1,.54) 100%)}
#canvas-wrap{position:relative;z-index:1;width:auto;min-width:320px;max-width:520px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:10px 14px;background:transparent}
#canvas-wrap canvas{display:block;width:100%!important;height:auto!important}

#dragon-bg{
  position:absolute;
  inset:0;
  background-image:url('');
  background-size:cover;
  background-position:center 18%;
  opacity:0;
  transition:opacity 0.5s ease;
  pointer-events:none;
  z-index:0;
}
#dragon-bg.visible{opacity:1;}
@media(max-width:767px){
  #app{flex-direction:column;height:100vh;overflow:hidden;position:relative}
  #left-panel{display:none}
  #game-panel{flex:1;min-height:0;flex-direction:column;align-items:stretch;justify-content:flex-start;overflow:hidden;position:relative;display:flex}
  #dragon-bg{background-position:center 30%}
  #canvas-wrap{padding:4px;width:100%;max-width:100%;flex:1;min-height:0;overflow:hidden;padding-bottom:0}
  #canvas-wrap canvas{width:100%!important;height:auto!important;max-height:100%;display:block}
  #mob-panel{display:flex!important;position:static;width:100%;height:240px;min-height:240px;overflow:hidden;z-index:20;justify-content:center;align-items:center}
  #mob-panel>*{width:100%}
}
.ph{padding:18px 18px 12px;border-bottom:1px solid rgba(26,46,69,0.6)}
.pt{font-family:'Cinzel',serif;font-size:20px;font-weight:900;color:#c8a44a;letter-spacing:2px}
.ps{font-size:10px;color:#3a5a7a;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.pb{padding:14px 18px;display:flex;flex-direction:column;gap:12px;flex:1}
.lbl{font-size:10px;color:#3a5a7a;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:4px}
.tab-row{display:flex;background:#0d1e30;border-radius:9px;padding:3px;gap:3px}
.tab{flex:1;padding:8px 0;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:#3a5a7a;transition:all .2s}
.tab.on{background:#162840;color:#c8d8e8;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.bet-row{display:flex;gap:5px}
.bet-wrap{flex:1;background:#0d1e30;border:1.5px solid #1a3050;border-radius:9px;display:flex;align-items:center;padding:0 10px;gap:7px;min-height:42px}
.bet-wrap:focus-within{border-color:#2a6aaa}
.coin{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#d09020,#edb830);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#5a2800;flex-shrink:0}
.bet-inp{flex:1;background:transparent;border:none;color:#e8c870;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;outline:none;min-width:0}
.mod-btn{background:#0d1828;border:1.5px solid #1a3050;border-radius:7px;color:#5a7a9a;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;padding:0 12px;cursor:pointer;height:42px;transition:all .15s}
.mod-btn:hover{border-color:#c8a44a;color:#c8a44a}
.diff-wrap{position:relative}
.diff-sel{width:100%;background:#0d1e30;border:1.5px solid #1a3050;border-radius:9px;color:#c8d8e8;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:9px 36px 9px 12px;appearance:none;cursor:pointer;outline:none}
.diff-sel:focus{border-color:#2a6aaa}
.darr{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#3a5a7a;pointer-events:none;font-size:10px}
#d-action button{width:100%;border:none;border-radius:11px;font-family:'Cinzel',serif;font-size:14px;font-weight:900;padding:14px;cursor:pointer;letter-spacing:1px;transition:all .2s}
.d-bet{background:linear-gradient(135deg,#a8b800,#d8e200,#a8b800);color:#111100;box-shadow:0 4px 18px rgba(176,192,0,.3)}
.d-bet:hover{transform:translateY(-1px)}
.d-bet:disabled{background:#1a2204!important;color:#303808!important;cursor:not-allowed!important;transform:none!important;box-shadow:none!important}
.d-cash{background:linear-gradient(135deg,#a8b800,#d8e200,#a8b800);color:#111100;animation:cpulse 1.5s ease-in-out infinite}
@keyframes cpulse{0%,100%{box-shadow:0 4px 18px rgba(176,192,0,.3)}50%{box-shadow:0 4px 32px rgba(176,192,0,.7)}}
.d-rnd{width:100%;background:#0d1e30;border:1.5px solid #1a3050;border-radius:11px;color:#6a8aaa;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;padding:12px;cursor:pointer;transition:all .2s}
.d-rnd:hover{border-color:#c8a44a;color:#c8a44a}
.d-rnd:disabled{opacity:.38;cursor:not-allowed}
.profit-box{background:#060e1a;border:1px solid #142030;border-radius:9px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center}
.plbl{font-size:10px;color:#3a5a7a;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.pmult{font-size:12px;color:#c8a44a;font-weight:700;margin-top:2px}
.pval{font-size:16px;font-weight:700;color:#38d080;font-family:'Rajdhani',sans-serif}
.bal-row{display:flex;justify-content:space-between}
.blbl{font-size:11px;color:#c8a44a;font-weight:700}
.bval{font-size:14px;font-weight:700;color:#e8d080;font-family:'Rajdhani',sans-serif}
#mob-panel{display:none;flex-direction:column;background:transparent;border-top:none;padding:8px 10px;flex-shrink:0;z-index:10;justify-content:center}
/* ── Mobile panel rows ──────────────────────────────────── */
.m-tabs-row{display:flex;background:transparent;border-radius:8px;padding:3px;gap:3px;margin-bottom:5px}
.m-tab{flex:1;padding:7px 0;border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:#3a5a7a;transition:all .2s}
.m-tab.on{background:rgba(30,48,80,0.5);color:#c8d8e8;box-shadow:0 2px 8px rgba(0,0,0,.5)}
/* Row 1: Difficulty */

/* Row 2: Balance + Random Pick */
.m-bal-row{display:flex;align-items:center;justify-content:space-between;background:transparent;border:none;border-radius:8px;padding:8px 14px;margin-bottom:5px}

.m-bal-lbl{font-size:11px;color:#4a7aaa;text-transform:uppercase;letter-spacing:2px;font-weight:700}

.m-coin{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#d09020,#edb830);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#5a2800;flex-shrink:0}
.m-rnd{font-size:12px;color:#4a7aaa;text-transform:uppercase;letter-spacing:2px;font-weight:700;cursor:pointer;background:none;border:none;font-family:'Rajdhani',sans-serif;transition:color .2s;padding:0}
.m-rnd:hover{color:#c8a44a}
.m-rnd:disabled{opacity:.33;cursor:not-allowed}
/* Row 3: Bet + Play + Profit */
.m-main{display:flex;align-items:center;gap:6px}
/* Bet card */
.m-bet-card{flex:1;background:transparent;border:none;border-radius:9px;padding:8px 10px;display:flex;flex-direction:column;gap:3px;min-width:0}
.m-bet-lbl{font-size:10px;color:#4a7aaa;text-transform:uppercase;letter-spacing:2px;font-weight:700}

select option{background:#0d1e30;color:#c8d8e8}

<div id="app" >
<div id="left-panel">
  <div class="ph"><div class="pt">🐉 Dragon Tower</div><div class="ps">Find the egg · Avoid the dragon</div></div>
  <div class="pb">
    <div class="tab-row"><button class="tab on">Manual</button><button class="tab" onclick="showToast('Auto coming soon!')">Auto</button></div>

      <div class="bet-row">
        <div class="bet-wrap"><div class="coin">$</div><input class="bet-inp" id="d-bet" type="number" value="5" min="0.01" step="0.01" oninput="syncBet(this.value)"/></div>
        <button class="mod-btn" onclick="adjBet(.5)">½</button>

      <div class="diff-wrap">
        <select class="diff-sel" id="d-diff" onchange="changeDiff(this.value)">
          <option value="Easy">Easy — 4 cols · 3 eggs · 1 dragon</option>
          <option value="Medium" selected>Medium — 3 cols · 2 eggs · 1 dragon</option>
          <option value="Hard">Hard — 2 cols · 1 egg · 1 dragon</option>

<div id="mob-panel">
  <!-- Row 0: Manual / Auto tabs -->
  <div class="m-tabs-row">

  <!-- Row 1: Difficulty -->

      <select class="m-diff-sel" id="m-diff" onchange="changeDiff(this.value)">

        <option value="Hard">Hard</option><option value="Expert">Expert</option><option value="Master">Master</option>

        <div class="m-arrows">

          <button class="m-arr" onclick="adjBet(.5)">▼</button>

<div id="toast"></div>

<!-- Hidden images so browser decodes them; PixiJS reads via Texture.from(img.src) -->

  <img id="img-dragon-small"  crossorigin="anonymous" src="dragon_normal.png">

  <img id="img-tile-tex"      crossorigin="anonymous" src="dragon_normal.png">
  <img id="img-egg"           crossorigin="anonymous" src="dragon-egg-3.png">
  <img id="img-dragon-icon"   crossorigin="anonymous" src="dragon_icon.png">

<script>
// ══════════════════════════════════════════════════════════
// DIFFICULTY CONFIG
// cols  = total columns  |  eggs = safe (find all to advance)
// heads = dragons (hit one = lose)  |  rows = tower height
// ══════════════════════════════════════════════════════════
const DIFF = {
  Easy:   { cols:4, eggs:3, heads:1, rows:9 },
  Medium: { cols:3, eggs:2, heads:1, rows:9 },
  Hard:   { cols:2, eggs:1, heads:1, rows:9 },
  Expert: { cols:3, eggs:1, heads:2, rows:9 },
  Master: { cols:4, eggs:1, heads:3, rows:9 },
};
const MULTS = {
  Easy:   [1.08,1.17,1.27,1.37,1.49,1.61,1.74,1.88,2.04],
  Medium: [1.22,1.49,1.82,2.23,2.73,3.34,4.08,4.99,6.09],
  Hard:   [1.96,3.84,7.52,14.72,28.83,56.47,110.6,216.6,424.2],
  Expert: [2.85,8.12,23.1,65.8,187.5,534,1521,4332,12345],
  Master: [3.79,14.35,54.4,206,781,2960,11219,42527,161200],
};

// ── State ──────────────────────────────────────────────────
let balance=1000, bet=5, diff='Medium';
let gstate='idle', tower=[], curRow=0, curMult=1, curWin=0, revealed={};

// ── PixiJS ─────────────────────────────────────────────────
const CW=460, CH=610;
const app = new PIXI.Application({
  width:CW, height:CH, backgroundAlpha:0,
  resolution:Math.min(window.devicePixelRatio||1,2),
  autoDensity:true, antialias:true,
  powerPreference: 'default',
});
document.getElementById('canvas-wrap').appendChild(app.view);

function scaleCanvas(){
  const panel = document.getElementById('game-panel');
  const wrap  = document.getElementById('canvas-wrap');
  const isMobile = window.innerWidth <= 767;

  if(isMobile){
    // Mobile: fill available width
    const w = wrap.clientWidth;
    const h = Math.round(w * CH / CW);
    app.view.style.width  = w + 'px';
    app.view.style.height = h + 'px';
    wrap.style.width = '100%';
  } else {
    // Desktop: scale to fit available panel HEIGHT with padding
    const availH = panel.clientHeight - 40; // 40px breathing room
    const maxW   = 520;
    const byH    = Math.round(availH * CW / CH); // width if we fill by height
    const w      = Math.min(byH, maxW);
    const h      = Math.round(w * CH / CW);
    app.view.style.width  = w + 'px';
    app.view.style.height = h + 'px';
    wrap.style.width = w + 'px';
  }
}
window.addEventListener('resize', scaleCanvas);
window.addEventListener('load', ()=>{ setTimeout(scaleCanvas, 50); });

const bgLayer=new PIXI.Container(), gridLayer=new PIXI.Container(), fxLayer=new PIXI.Container();
app.stage.addChild(bgLayer,gridLayer,fxLayer);

const TEX={};
const particles=[];
app.ticker.add(()=>{
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p._life-=p._decay;
    if(p._life<=0){fxLayer.removeChild(p);p.destroy();particles.splice(i,1);continue;}
    p.x+=p._vx; p.y+=p._vy; p._vy+=0.12;
    p.alpha=p._life; p.scale.set(Math.max(0.05,p._life*.8+.2));
  }
});

// textures loaded below after all declarations

// ── Vignette ────────────────────────────────────────────────
function buildVignette(){
  bgLayer.removeChildren();
  const v=new PIXI.Graphics();
  v.beginFill(0x000000,0.22); v.drawRect(0,CH*.58,CW,CH*.42); v.endFill();
  v.beginFill(0x000000,0.10); v.drawRect(0,0,CW,CH*.15); v.endFill();
  bgLayer.addChild(v);
}

// ── Layout ───────────────────────────────────────────────────
const PAD=18, TGAP=7, RGAP=5, WALL_H=32;
let tileObjs=[];

function calcLayout(){
  const cfg=DIFF[diff];
  const gridW=CW-PAD*2;
  const tileW=(gridW-TGAP*(cfg.cols-1))/cfg.cols;
  const maxH=(CH-55-RGAP*(cfg.rows-1))/cfg.rows;
  const tileH=Math.min(tileW*.5,maxH,44);
  const gridH=cfg.rows*tileH+(cfg.rows-1)*RGAP;
  const gridY=CH-gridH-8;
  return {cols:cfg.cols,rows:cfg.rows,tileW,tileH,gridH,gridY};
}

// ── Stone frame ──────────────────────────────────────────────
function drawFrame(L){
  const fx=PAD-13, fy=L.gridY-13;
  const fw=CW-fx-(PAD-13), fh=L.gridH+26, wcy=fy-WALL_H;
  const g=new PIXI.Graphics();
  // shadow
  g.beginFill(0x000000,.6); g.drawRoundedRect(fx-2,fy+5,fw+4,fh+4,13); g.endFill();
  // frame body
  g.beginFill(0x28251e); g.drawRoundedRect(fx,fy,fw,fh,11); g.endFill();
  // mortar h-lines
  g.lineStyle(1.5,0x18160e,.85);
  for(let y=fy+20;y<fy+fh-5;y+=20){ g.moveTo(fx+6,y); g.lineTo(fx+fw-6,y); }
  // mortar v-lines staggered
  for(let r2=0;r2*20<fh;r2++){
    const yy=fy+r2*20, off=(r2%2)*24;
    for(let x=fx+off;x<fx+fw;x+=48){ g.moveTo(x,yy); g.lineTo(x,Math.min(yy+20,fy+fh)); }
  }
  // dark inner
  g.lineStyle(0); g.beginFill(0x060c18,.75); g.drawRoundedRect(fx+9,fy+9,fw-18,fh-18,7); g.endFill();
  // wall cap
  g.beginFill(0x343028); g.drawRoundedRect(fx-9,wcy,fw+18,WALL_H+7,9); g.endFill();
  g.lineStyle(1.5,0x201c14,.85);
  for(let x=fx;x<fx+fw;x+=40){ g.moveTo(x,wcy); g.lineTo(x,wcy+WALL_H+7); }
  // battlements
  g.lineStyle(0); g.beginFill(0x040a12,.9);
  for(let x=fx+20;x<fx+fw-22;x+=40){ g.drawRoundedRect(x,wcy-17,23,19,4); }
  g.endFill();
  g.lineStyle(1,0x48402e,.25); g.drawRoundedRect(fx,fy,fw,fh,11);
  gridLayer.addChild(g);

  // Wall texture on cap
  if(TEX.wall){
    const wt=new PIXI.TilingSprite(TEX.wall,fw+18,WALL_H+2);
    wt.x=fx-9; wt.y=wcy+2; wt.alpha=.38; gridLayer.addChild(wt);
  }
  // Dragon on wall — swappable between normal and fire
  const dTex = TEX.dragon_normal || TEX.dragon_small;
  if(dTex){
    const ds=new PIXI.Sprite(dTex);
    const sc=Math.min(120/ds.texture.width,96/ds.texture.height);
    ds.scale.set(sc); ds.anchor.set(.5,1); ds.x=CW/2; ds.y=wcy+4; ds.alpha=1;
    ds.name='wallDragon';
    gridLayer.addChild(ds);
  }
  // Bottom wall image
  if(TEX.wall_bottom){
    const wb=new PIXI.Sprite(TEX.wall_bottom);
    const wbH=36;
    wb.width=fw+36; wb.height=wbH;
    wb.x=fx-18; wb.y=fy+fh-wbH/2;
    wb.alpha=1;
    gridLayer.addChild(wb);
  }
}

// ── Build grid ────────────────────────────────────────────────
function buildGrid(){
  gridLayer.removeChildren(); tileObjs=[];
  const L=calcLayout();
  drawFrame(L);
  for(let r=0;r<L.rows;r++){
    tileObjs[r]=[];
    const vRow=L.rows-1-r;
    const rowY=L.gridY+vRow*(L.tileH+RGAP);
    for(let c=0;c<L.cols;c++){
      const tile=makeTile(r,c,PAD+c*(L.tileW+TGAP),rowY,L.tileW,L.tileH);
      tileObjs[r][c]=tile; gridLayer.addChild(tile.root);
    }
    const ml=new PIXI.Text('',{fontFamily:'Rajdhani',fontSize:10,fill:0x1a3050,fontWeight:'700'});
    ml.anchor.set(0,.5); ml.x=CW-PAD+5; ml.y=rowY+L.tileH/2;
    gridLayer.addChild(ml); tileObjs[r]._ml=ml;
  }
  refreshGrid();
}

// ── Tile ──────────────────────────────────────────────────────
function makeTile(r,c,x,y,w,h){
  const root=new PIXI.Container(); root.x=x; root.y=y;
  const bg=new PIXI.Graphics(); root.addChild(bg);
  // Tile image sprite (dark or green)
  const tsprite=new PIXI.Container(); root.addChild(tsprite);
  let ttex=null;
  if(TEX.tile_tex){
    ttex=new PIXI.TilingSprite(TEX.tile_tex,w,h);
    ttex.alpha=0; root.addChild(ttex);
  }
  const icons=new PIXI.Container(); root.addChild(icons);
  const hit=new PIXI.Graphics();
  hit.beginFill(0xffffff,.001); hit.drawRoundedRect(0,0,w,h,6); hit.endFill();
  hit.eventMode='static'; hit.cursor='pointer';
  const _r=r,_c=c;
  hit.on('pointerdown',()=>clickTile(_r,_c));
  hit.on('pointerover',()=>{if(gstate==='playing'&&curRow===_r&&!(revealed[_r]||{})[_c])paintBg(bg,tsprite,ttex,w,h,'hover');});
  hit.on('pointerout', ()=>{if(gstate==='playing'&&curRow===_r&&!(revealed[_r]||{})[_c])paintBg(bg,tsprite,ttex,w,h,'active');});
  root.addChild(hit);
  paintBg(bg,tsprite,ttex,w,h,'idle');
  return {root,bg,tsprite,ttex,icons,hit,w,h};
}

function setTileSprite(container,tex,w,h){
  container.removeChildren();
  if(!tex) return;
  const sp=new PIXI.Sprite(tex);
  sp.width=w; sp.height=h; sp.x=0; sp.y=0;
  container.addChild(sp);
}

function paintBg(g,ts,ttex,w,h,state){
  g.clear(); g.lineStyle(0); const R=6;
  if(state==='active'||state==='hover'){
    // Green tile for active row — always shown, hover slightly brightens
    setTileSprite(ts,TEX.tile_green,w,h);
    if(ts.children[0]) ts.children[0].alpha = state==='hover' ? 1 : 0.88;
    if(ttex) ttex.alpha=0;
  } else if(state==='idle'||state==='inactive'){
    // Black tile for non-active rows
    setTileSprite(ts,TEX.tile_dark,w,h);
    if(ttex) ttex.alpha=0;
  } else if(state==='egg'){
    // Black tile for revealed egg
    setTileSprite(ts,null,w,h);
    g.beginFill(0x000000,.6); g.drawRoundedRect(1,2,w,h,R); g.endFill();
    g.beginFill(0x080808);    g.drawRoundedRect(0,0,w,h,R); g.endFill();
    if(ttex) ttex.alpha=0;
    g.lineStyle(2,0x222222,.9); g.drawRoundedRect(0,0,w,h,R);
  } else if(state==='dragon'){
    // Red tile for revealed dragon
    setTileSprite(ts,null,w,h);
    g.beginFill(0x000000,.5);  g.drawRoundedRect(1,2,w,h,R); g.endFill();
    g.beginFill(0x180303);     g.drawRoundedRect(0,0,w,h,R); g.endFill();
    g.beginFill(0x7a0606,.5);  g.drawRoundedRect(0,0,w,h,R); g.endFill();
    if(ttex) ttex.alpha=0;
    g.lineStyle(2,0xcc1414,.95); g.drawRoundedRect(0,0,w,h,R);
  }
}

// ── Icons — egg and dragon head from actual assets ─────────────
function setIcon(tile,type){
  tile.icons.removeChildren();
  const w=tile.w, h=tile.h;
  if(type==='egg'){
    if(TEX.egg){
      const sp=new PIXI.Sprite(TEX.egg);
      const sc=Math.min((w*.87)/sp.texture.width,(h*1.08)/sp.texture.height);
      sp.scale.set(sc); sp.anchor.set(.5); sp.x=w/2; sp.y=h/2;
      tile.icons.addChild(sp);
    }
  } else {
    if(TEX.dragon_icon){
      const sp=new PIXI.Sprite(TEX.dragon_icon);
      const sc=Math.min((w*1.08)/sp.texture.width,(h*1.17)/sp.texture.height);
      sp.scale.set(sc); sp.anchor.set(.5); sp.x=w/2; sp.y=h/2;
      tile.icons.addChild(sp);
    }
  }
}

// ── Refresh ───────────────────────────────────────────────────
function refreshGrid(){
  const mults=MULTS[diff];
  for(let r=0;r<tileObjs.length;r++){
    if(!tileObjs[r]) continue;
    const isCur=gstate==='playing'&&r===curRow;
    const isPast=gstate==='playing'&&r<curRow;
    const revRow=revealed[r]||{};
    const ml=tileObjs[r]._ml;
    if(ml){ ml.text=mults[r]?mults[r]+'×':''; ml.style.fill=isCur?0xc8a44a:0x1a3050; }
    for(let c=0;c<tileObjs[r].length;c++){
      const tile=tileObjs[r][c]; if(!tile) continue;
      const rv=revRow[c];
      let state = rv ? rv : gstate==='idle' ? 'idle' : isCur ? 'active' : isPast ? 'idle' : 'inactive';
      paintBg(tile.bg,tile.tsprite,tile.ttex,tile.w,tile.h,state);
      const clickable=gstate==='playing'&&isCur&&!rv;
      tile.hit.eventMode=clickable?'static':'none';
      tile.hit.cursor=clickable?'pointer':'default';
      if(rv){ setIcon(tile,rv); }
      else{ tile.icons.removeChildren(); if(tile.ttex) tile.ttex.alpha=0; }
    }
  }
}

// ── Particles ─────────────────────────────────────────────────
function spawnFX(r,c,type){
  const L=calcLayout();
  const cx=PAD+c*(L.tileW+TGAP)+L.tileW/2;
  const cy=L.gridY+(L.rows-1-r)*(L.tileH+RGAP)+L.tileH/2;
  const pal=type==='fire'?[0xff2200,0xff5500,0xff8800,0xffbb00]:[0x20ff60,0x14ff50,0x88ffb8,0x40ff80];
  for(let i=0;i<(type==='fire'?32:18);i++){
    const pg=new PIXI.Graphics();
    pg.beginFill(pal[i%pal.length],.94); pg.drawCircle(0,0,2+Math.random()*(type==='fire'?7:4)); pg.endFill();
    const angle=-Math.PI/2+(Math.random()-.5)*(type==='fire'?Math.PI*1.7:Math.PI);
    const spd=(type==='fire'?2.4:1.5)+Math.random()*3.8;
    pg.x=cx+(Math.random()-.5)*32; pg.y=cy+(Math.random()-.5)*22;
    pg._vx=Math.cos(angle)*spd; pg._vy=Math.sin(angle)*spd;
    pg._life=1; pg._decay=.014+Math.random()*.026;
    fxLayer.addChild(pg); particles.push(pg);
  }
}

// ── Game logic ────────────────────────────────────────────────
function genRow(){
  const cfg=DIFF[diff], arr=[];
  for(let i=0;i<cfg.eggs;i++) arr.push('egg');
  for(let i=0;i<cfg.heads;i++) arr.push('dragon');
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function startGame(){
  bet=parseFloat(document.getElementById('d-bet').value)||parseFloat(document.getElementById('m-bet').value)||5;
  if(bet<=0){showToast('Enter a valid bet!');return;}
  if(bet>balance){showToast('Insufficient balance!');return;}
  balance-=bet;
  tower=Array.from({length:DIFF[diff].rows},()=>genRow());
  curRow=0; curMult=1; curWin=0; revealed={};
  gstate='playing'; buildGrid(); refreshUI();
}

function clickTile(r,c){
  if(gstate!=='playing'||r!==curRow) return;
  if((revealed[r]||{})[c]) return;
  const type=tower[r][c];
  if(!revealed[r]) revealed[r]={};
  revealed[r][c]=type;
  if(type==='dragon'){
    // Losing row: only reveal the clicked tile, hide everything else
    // Unplayed rows above losing row: reveal exactly one egg only
    for(let ar=r+1;ar<tower.length;ar++){
      revealed[ar]={};
      let eggsShown=0;
      const maxEggs=DIFF[diff].eggs;
      for(let i=0;i<tower[ar].length;i++){
        if(tower[ar][i]==='egg'&&eggsShown<maxEggs){
          revealed[ar][i]='egg'; eggsShown++;
        }
      }
    }
    gstate='ended'; refreshGrid(); refreshUI();
    spawnFX(r,c,'fire');
    setTimeout(()=>showResult('lose',bet,'You found the dragon! Better luck next time.'),900);
  } else {
    spawnFX(r,c,'sparkle');
    const m=MULTS[diff][r]||MULTS[diff][MULTS[diff].length-1];
    curMult=m; curWin=parseFloat((bet*m).toFixed(2));
    const eggsFound=Object.values(revealed[r]).filter(v=>v==='egg').length;
    if(eggsFound>=1){
      curRow++;
      if(curRow>=DIFF[diff].rows){
        balance+=curWin; gstate='ended'; refreshGrid(); refreshUI();
        setTimeout(()=>showResult('win',curWin,'🐉 Tower Conquered!'),500);
      } else { refreshGrid(); refreshUI(); }
    } else { refreshGrid(); refreshUI(); }
  }
}

function cashOut(){
  if(gstate!=='playing'||curRow===0) return;
  balance+=curWin; gstate='ended'; refreshGrid(); refreshUI();
  showResult('win',curWin,'Cashed out at '+curMult.toFixed(2)+'×');
}
function doRandom(){
  if(gstate!=='playing') return;
  const avail=[];
  for(let c=0;c<DIFF[diff].cols;c++) if(!(revealed[curRow]||{})[c]) avail.push(c);
  if(!avail.length) return;
  clickTile(curRow,avail[Math.floor(Math.random()*avail.length)]);
}
function mPlayAction(){
  if(gstate==='playing'&&curRow>0){cashOut();}
  else if(gstate!=='playing'){
    bet=parseFloat(document.getElementById('m-bet').value)||5;
    diff=document.getElementById('m-diff').value;
    document.getElementById('d-diff').value=diff;
    startGame();
  }
}
function resetGame(){
  swapDragonSprite(false);
  document.getElementById('result').classList.remove('show');

  gstate='idle'; tower=[]; revealed={}; curRow=0; curMult=1; curWin=0;
  buildGrid(); refreshUI();
}
function changeDiff(v){
  if(gstate!=='idle') return;
  diff=v; document.getElementById('d-diff').value=v; document.getElementById('m-diff').value=v; buildGrid();
}
function syncBet(v){ bet=parseFloat(v)||0; document.getElementById('d-bet').value=v; document.getElementById('m-bet').value=v; }
function adjBet(m){ if(gstate==='playing') return; bet=Math.max(0.01,parseFloat((bet*m).toFixed(2))); document.getElementById('d-bet').value=bet; document.getElementById('m-bet').value=bet; }
function fmt(v){ return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function refreshUI(){
  document.getElementById('d-bal').textContent=fmt(balance);
  document.getElementById('m-bal').textContent=fmt(balance);
  document.getElementById('d-mult').textContent=curMult.toFixed(2)+'×';
  document.getElementById('d-prof').textContent=fmt(curWin);
  document.getElementById('m-mult').textContent='('+curMult.toFixed(2)+'×)';
  document.getElementById('m-prof').textContent=curWin.toFixed(8);
  const da=document.getElementById('d-action');
  const dr=document.getElementById('d-rnd');
  const mr=document.getElementById('m-rnd');
  const mp=document.getElementById('m-play');
  if(gstate==='playing'&&curRow>0){
    da.innerHTML='<button class="d-cash" onclick="cashOut()">💰 Cash Out '+fmt(curWin)+'</button>';
    dr.disabled=false; mr.disabled=false;
    mp.className='cash-anim';
    mp.style.cssText='width:74px;height:74px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#f4ff40,#c8d800 55%,#9aaa00);border:none;box-shadow:0 0 0 5px rgba(180,200,0,.2),0 0 0 10px rgba(180,200,0,.1),0 8px 28px rgba(180,200,0,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;';
    mp.onclick=cashOut;
    mp.innerHTML='<div style="text-align:center;line-height:1.15"><div style="font-size:16px">💰</div><div style="font-size:8px;font-weight:800;color:#1c2e00;font-family:Rajdhani,sans-serif">'+fmt(curWin)+'</div></div>';
  } else if(gstate==='playing'){
    da.innerHTML='<button class="d-bet" disabled>Pick a tile...</button>';
    dr.disabled=false; mr.disabled=false;
    mp.className=''; mp.style.cssText=''; mp.setAttribute('style','');
    mp.onclick=null; mp.disabled=true; mp.innerHTML='<div class="tri"></div>';
  } else {
    da.innerHTML='<button class="d-bet" onclick="startGame()">Bet</button>';
    dr.disabled=true; mr.disabled=true;
    mp.className=''; mp.style.cssText=''; mp.setAttribute('style','');
    mp.onclick=mPlayAction; mp.disabled=false; mp.innerHTML='<div class="tri"></div>';
  }
}
function fmtBtc(v){ return v.toFixed(8); }
function showResult(type,amount,sub){
  document.getElementById('rcard').className='rcard '+type;
  const multVal = type==='win' ? curMult : 0;
  document.getElementById('r-mult').textContent=multVal.toFixed(2)+'x';
  document.getElementById('r-amt').textContent=fmtBtc(amount);
  document.getElementById('result').classList.add('show');
  // Show fire dragon background only on WIN
  const dragonBg = document.getElementById('dragon-bg');
  const dragonImg = document.getElementById('img-dragon-small');
  swapDragonSprite(type==='win');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Swap dragon sprite on win/reset ──────────────────────────
function swapDragonSprite(win){
  const tex = win ? (TEX.dragon_fire||TEX.dragon_normal||TEX.dragon_small)
                  : (TEX.dragon_normal||TEX.dragon_small);
  if(!tex) return;
  for(let i=0;i<gridLayer.children.length;i++){
    const ch=gridLayer.children[i];
    if(ch.name==='wallDragon'){
      ch.texture=tex;
      const sc=win
        ? Math.min(180/tex.width, 80/tex.height)
        : Math.min(120/tex.width, 96/tex.height);
      ch.scale.set(sc);
      break;
    }
  }
}

// ── Load textures + init (placed after all declarations) ──────
function loadTextures(){
  const map = {
    dragon_small:  'img-dragon-small',
    dragon_normal: 'img-dragon-normal',
    dragon_fire:   'img-dragon-fire',
    wall_bottom:   'img-wall-bottom',
    wall:          'img-wall',
    tile_tex:      'img-tile-tex',
    egg:           'img-egg',
    dragon_icon:   'img-dragon-icon',
    tile_dark:     'img-tile-dark',
    tile_green:    'img-tile-green',
  };

  for(const [key, id] of Object.entries(map)){
    const el = document.getElementById(id);
    if(!el) continue;
    if(el.complete && el.naturalWidth > 0){
      TEX[key] = PIXI.Texture.from(el.src);
    } else {
      el.onload = () => { TEX[key] = PIXI.Texture.from(el.src); buildGrid(); };
    }
  }
  buildGrid();
}
function init(){
  loadTextures();
  buildVignette();
  buildGrid();
  scaleCanvas();
}

const _imgs = document.querySelectorAll('#asset-imgs img');
const _allLoaded = [..._imgs].every(i=>i.complete && i.naturalWidth>0);
if(_allLoaded){ init(); } else { window.addEventListener('load', init); }
</script>
