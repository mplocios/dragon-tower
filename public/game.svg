<svg width="790" height="649" viewBox="0 0 790 649" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="790" height="649" rx="20" fill="#0F0E12"/>
  <rect x="20" y="20" width="750" height="609" rx="10" fill="#1A191D"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#282A2F" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="20" y="20" width="750" height="609" fill="url(#grid)" rx="10"/>

  <!-- Center game area -->
  <circle cx="395" cy="324" r="150" fill="#282A2F" opacity="0.3"/>
  <circle cx="395" cy="324" r="100" fill="#EAFF00" opacity="0.1"/>

  <!-- Game title -->
  <text x="395" y="310" font-family="Poppins" font-size="32" font-weight="bold" text-anchor="middle" fill="#EAFF00">CRASH</text>
  <text x="395" y="350" font-family="Poppins" font-size="18" text-anchor="middle" fill="#B4B4B4">Place your bet</text>
</svg>
